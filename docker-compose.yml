services:

  consul:
    container_name: consul
    build:
      context: .
      dockerfile: consul/Dockerfile
    ports:
      - "8500:8500"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://consul:8500/v1/status/leader" ]
      interval: 5s
      timeout: 3s
      retries: 5

  accounts_data:
    image: postgres:17-alpine
    container_name: accounts-data
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ACCOUNTS_DB_NAME}
      POSTGRES_USER: ${ACCOUNTS_DB_USERNAME}
      POSTGRES_PASSWORD: ${ACCOUNTS_DB_PASSWORD}
    ports:
      - "${ACCOUNTS_DB_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${ACCOUNTS_DB_USERNAME} -d ${ACCOUNTS_DB_NAME}" ]
      interval: 5s

  cash_data:
    image: postgres:17-alpine
    container_name: cash-data
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${CASH_DB_NAME}
      POSTGRES_USER: ${CASH_DB_USERNAME}
      POSTGRES_PASSWORD: ${CASH_DB_PASSWORD}
    ports:
      - "${CASH_DB_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${CASH_DB_USERNAME} -d ${CASH_DB_NAME}" ]
      interval: 5s

  transfer_data:
    image: postgres:17-alpine
    container_name: transfer-data
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TRANSFER_DB_NAME}
      POSTGRES_USER: ${TRANSFER_DB_USERNAME}
      POSTGRES_PASSWORD: ${TRANSFER_DB_PASSWORD}
    ports:
      - "${TRANSFER_DB_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${TRANSFER_DB_USERNAME} -d ${TRANSFER_DB_NAME}" ]
      interval: 5s

  notifications_data:
    image: postgres:17-alpine
    container_name: notifications-data
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NOTIFICATIONS_DB_NAME}
      POSTGRES_USER: ${NOTIFICATIONS_DB_USERNAME}
      POSTGRES_PASSWORD: ${NOTIFICATIONS_DB_PASSWORD}
    ports:
      - "${NOTIFICATIONS_DB_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${NOTIFICATIONS_DB_USERNAME} -d ${NOTIFICATIONS_DB_NAME}" ]
      interval: 5s

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.1
    container_name: keycloak
    command: start-dev --import-realm --http-port=8082
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    volumes:
      - .:/opt/keycloak/data/import
    ports:
      - "8082:8082"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://keycloak:8082/health/ready" ]
      interval: 10s
      timeout: 5s
      retries: 5