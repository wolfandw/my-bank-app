spring.application.name=notifications
server.port=8086

spring.r2dbc.url=r2dbc:postgresql://${NOTIFICATIONS_DB_HOST:localhost}:${NOTIFICATIONS_DB_PORT:5436}/${NOTIFICATIONS_DB_NAME:notifications_db}
spring.r2dbc.username=${NOTIFICATIONS_DB_USERNAME:postgres}
spring.r2dbc.password=${NOTIFICATIONS_DB_PASSWORD:postgres}
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=10
spring.r2dbc.pool.max-size=50
spring.r2dbc.pool.max-idle-time=30s
spring.r2dbc.pool.max-life-time=10m
spring.r2dbc.pool.validation-query=SELECT 1

spring.datasource.url=jdbc:postgresql://${NOTIFICATIONS_DB_HOST:localhost}:${NOTIFICATIONS_DB_PORT:5436}/${NOTIFICATIONS_DB_NAME:notifications_db}
spring.datasource.username=${NOTIFICATIONS_DB_USERNAME:postgres}
spring.datasource.password=${NOTIFICATIONS_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.liquibase.url= jdbc:postgresql://${NOTIFICATIONS_DB_HOST:localhost}:${NOTIFICATIONS_DB_PORT:5436}/${NOTIFICATIONS_DB_NAME:notifications_db}
spring.liquibase.user=${NOTIFICATIONS_DB_USERNAME:postgres}
spring.liquibase.password=${NOTIFICATIONS_DB_PASSWORD:postgres}
spring.liquibase.enabled=true
spring.liquibase.contexts=dev,test,default
spring.liquibase.change-log=classpath:/db/changelog/notifications/db.changelog-master.xml

spring.config.import=optional:consul:${CONSUL_HOST:localhost}:8500
spring.cloud.consul.host=${CONSUL_HOST:localhost}
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${random.value}
spring.cloud.consul.config.enabled=true
spring.cloud.consul.config.format=PROPERTIES
spring.cloud.consul.config.data-key=data
spring.cloud.consul.config.prefix=config
spring.cloud.consul.config.defaultContext=application
spring.cloud.consul.config.watch.enabled=false
spring.cloud.consul.config.watch.delay=100000

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://${KEYCLOAK_HOST:localhost}:8080/realms/${KEYCLOAK_REALM:my-bank-app-realm}/protocol/openid-connect/certs
spring.security.oauth2.client.registration.keycloak.provider=keycloak
spring.security.oauth2.client.registration.keycloak.client-id=${spring.application.name}
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_NOTIFICATIONS_SECRET:dYULgKXgzByDWxcH8SQ5PIQ9CGWLgMZ0}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.keycloak.scope=openid
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://${KEYCLOAK_HOST:localhost}:${KEYCLOAK_PORT:8080}/realms/${KEYCLOAK_REALM:my-bank-app-realm}